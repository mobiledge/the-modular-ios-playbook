# XcodeGen project specification for the Chapter 1 monolith.
#
# Generate the .xcodeproj with:
#     brew install xcodegen   # one time
#     cd code/iTunesSearchApp
#     xcodegen generate
#     open iTunesSearchApp.xcodeproj
#
# Everything lives in ONE application target. That is the whole point of
# Chapter 1: the monolith. Later chapters break this single target apart.

name: iTunesSearchApp

options:
  bundleIdPrefix: com.playbook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  iTunesSearchApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playbook.iTunesSearchApp
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        # Let Xcode synthesize Info.plist so there is no file to hand-maintain.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
