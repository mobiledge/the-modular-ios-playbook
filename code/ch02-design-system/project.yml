# XcodeGen project specification for the Chapter 2 end-state.
#
# Generate the .xcodeproj with:
#     brew install xcodegen   # one time
#     cd code/ch02-design-system
#     xcodegen generate
#     open iTunesSearchApp.xcodeproj
#
# This is the Chapter 1 monolith with the design system extracted into a local
# Swift package (Packages/DesignSystem). There are now two app targets: the main
# app, and a standalone Catalog that imports only the design system.

name: iTunesSearchApp

options:
  bundleIdPrefix: com.playbook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

# Local Swift packages, referenced by path. The DesignSystem was extracted out
# of the app target in Chapter 2.
packages:
  DesignSystem:
    path: Packages/DesignSystem

targets:
  iTunesSearchApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    dependencies:
      - package: DesignSystem
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playbook.iTunesSearchApp
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        # Let Xcode synthesize Info.plist so there is no file to hand-maintain.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  # A standalone catalog app that imports ONLY the DesignSystem. Designers and
  # developers can run this to review components in isolation from the app's
  # business logic and network — one of the big payoffs of the extraction.
  DesignSystemCatalog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Catalog
    dependencies:
      - package: DesignSystem
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playbook.DesignSystemCatalog
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
