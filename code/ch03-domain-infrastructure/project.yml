# XcodeGen project specification — Chapter 3: Domain & Infrastructure.
#
# Generate the .xcodeproj with:
#     brew install xcodegen   # one time
#     cd code/ch03-domain-infrastructure
#     xcodegen generate
#     open iTunesSearchApp.xcodeproj
#
# The app now sits on top of three local packages: DesignSystem (Ch.2),
# Domain, and Infrastructure (Ch.3). Domain depends on nothing; Infrastructure
# depends on Domain; the app depends on all three.

name: iTunesSearchApp

options:
  bundleIdPrefix: com.playbook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

# Local Swift packages, referenced by path.
packages:
  DesignSystem:
    path: Packages/DesignSystem
  Domain:
    path: Packages/Domain
  Infrastructure:
    path: Packages/Infrastructure

targets:
  iTunesSearchApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    dependencies:
      - package: DesignSystem
      - package: Domain
      - package: Infrastructure
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playbook.iTunesSearchApp
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        # Let Xcode synthesize Info.plist so there is no file to hand-maintain.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  # A standalone catalog app that imports ONLY the DesignSystem. Designers and
  # developers can run this to review components in isolation from the app's
  # business logic and network — one of the big payoffs of the extraction.
  DesignSystemCatalog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Catalog
    dependencies:
      - package: DesignSystem
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playbook.DesignSystemCatalog
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
